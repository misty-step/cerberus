name: Orpheus Polish

on:
  issue_comment:
    types: [created]

concurrency:
  group: orpheus-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  polish:
    if: |
      github.event.issue.pull_request &&
      (
        contains(github.event.comment.body || '', '/orpheus') ||
        contains(github.event.comment.body || '', '/hephaestus')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve PR state
        id: pr_state
        uses: actions/github-script@v7
        with:
          script: |
            const [owner, repo] = context.repo.owner && context.repo.repo
              ? [context.repo.owner, context.repo.repo]
              : context.payload.repository.full_name.split("/");
            const prNumber = context.payload.issue.number;

            const query = `
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    reviewThreads(first: 100) {
                      nodes { isResolved }
                    }
                    commits(last: 1) {
                      nodes {
                        commit {
                          oid
                          statusCheckRollup { state }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const data = await github.graphql(query, { owner, repo, number: prNumber });
            const pr = data.repository.pullRequest;
            const unresolved = pr.reviewThreads.nodes.filter((thread) => !thread.isResolved).length;
            const commit = pr.commits.nodes[0]?.commit;
            const state = commit?.statusCheckRollup?.state ?? "PENDING";
            const deterministicGreen = state === "SUCCESS";

            core.setOutput("pr_number", String(prNumber));
            core.setOutput("head_sha", commit?.oid ?? "");
            core.setOutput("review_resolved", unresolved === 0 ? "true" : "false");
            core.setOutput("deterministic_green", deterministicGreen ? "true" : "false");

      - name: Derive mode from command
        id: mode
        shell: bash
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail
          BODY="${COMMENT_BODY:-}"
          MODE="audit"
          if [[ "$BODY" == *"/orpheus run"* || "$BODY" == *"/hephaestus run"* ]]; then
            MODE="apply"
          elif [[ "$BODY" == *"/orpheus dry-run"* || "$BODY" == *"/hephaestus dry-run"* ]]; then
            MODE="suggest"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"

      - name: Build temporary semantic plan
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/orpheus
          cat > /tmp/orpheus/plan.json <<'JSON'
          {
            "plan": {
              "summary": "Baseline Cerberus integration plan (no-op edits).",
              "risk": "low",
              "confidence": 0.75,
              "structuralEdits": [],
              "documentationEdits": [],
              "narrativeNotes": ["Integration wiring check."],
              "uncertainties": ["Replace with planner-generated semantic plan."]
            }
          }
          JSON

      - name: Run Orpheus
        uses: misty-step/orpheus@main
        with:
          mode: ${{ steps.mode.outputs.mode }}
          plan-path: /tmp/orpheus/plan.json
          apply-writes: "false"
        env:
          ORPHEUS_PR_NUMBER: ${{ steps.pr_state.outputs.pr_number }}
          ORPHEUS_HEAD_SHA: ${{ steps.pr_state.outputs.head_sha }}
          ORPHEUS_REPO: ${{ github.repository }}
          ORPHEUS_HANDOFF_READY: "true"
          ORPHEUS_DETERMINISTIC_GREEN: ${{ steps.pr_state.outputs.deterministic_green }}
          ORPHEUS_REVIEW_RESOLVED: ${{ steps.pr_state.outputs.review_resolved }}
          ORPHEUS_NO_BLOCKING_FINDINGS: "true"
          ORPHEUS_INTENT_LINKED: "true"
