# Cerberus AI Code Review
# https://github.com/misty-step/cerberus
name: Cerberus

on:
  pull_request:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: cerberus-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.label.name == 'cerberus-review'
    uses: ./.github/workflows/cerberus.yml
    with:
      timeout: 600
    secrets:
      api-key: ${{ secrets.CERBERUS_OPENROUTER_API_KEY }}
