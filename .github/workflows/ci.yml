name: Quality Checks

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19.5'
          otp-version: '28.0'

      - name: Cache mix artifacts
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-elixir-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-elixir-

      - name: Fetch Elixir deps
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Test
        run: mix test --max-cases 4

      - name: Check formatting
        run: mix format --check-formatted

      - name: Build packaged CLI
        run: mix escript.build

      - name: Verify escript contract
        run: ./test/escript_contract.sh

  # Aggregator for branch protection. Add new required jobs to needs: + condition below.
  merge-gate:
    name: merge-gate
    needs: [validate]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: All checks passed
        run: |
          if [[ "${{ needs.validate.result }}" == "success" ]]; then
            echo "merge-gate green"
          else
            echo "merge-gate red (validate=${{ needs.validate.result }})"
            exit 1
          fi
