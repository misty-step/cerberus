name: Deploy to Sprite

on:
  push:
    branches: [master]
    paths:
      - 'cerberus-elixir/**'
      - 'defaults/**'
      - 'pi/**'
      - 'templates/**'

  workflow_dispatch:

permissions: {}

concurrency:
  group: deploy-sprite
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install sprite CLI
        # To update: download new archive, run sha256sum, update both values.
        # Checksums: https://sprites-binaries.t3.storage.dev/client/<version>/sprite-linux-amd64.tar.gz.sha256
        env:
          SPRITE_VERSION: v0.0.1-rc41
          SPRITE_SHA256: 3c09e73f933d94bc02dd0872773dc1a34b8bb57eae1397091789433867ec8839
        run: |
          ARCHIVE="sprite-linux-amd64.tar.gz"
          curl -fsSL -o "$ARCHIVE" \
            "https://sprites-binaries.t3.storage.dev/client/${SPRITE_VERSION}/${ARCHIVE}"
          echo "${SPRITE_SHA256}  ${ARCHIVE}" | sha256sum -c -
          tar xzf "$ARCHIVE"
          install -m 755 sprite /usr/local/bin/sprite
          rm -rf "$ARCHIVE"
          sprite version

      - name: Authenticate
        run: sprite auth setup --token "${{ secrets.SPRITE_TOKEN }}"

      - name: Deploy
        run: ./cerberus-elixir/deploy-sprite.sh deploy

      - name: Restart app
        run: ./cerberus-elixir/deploy-sprite.sh restart

      - name: Health check
        run: |
          URL=$(sprite -s cerberus-api url)
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sS -o /dev/null -w "%{http_code}" "$URL/api/health" 2>&1) || true
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1

      - name: Checkpoint
        if: success()
        run: sprite -s cerberus-api checkpoint create --comment "ci-deploy-${{ github.sha }}"
