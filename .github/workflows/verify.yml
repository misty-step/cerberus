name: Verify

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Install gitleaks
        run: |
          curl -sSL -o /tmp/gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run repo gate
        run: ./scripts/verify.sh

  # Branch protection on master requires the `merge-gate` status context.
  # This job aggregates every required CI job into that single context, so the
  # protection rule has a real producer. Add future required jobs to `needs`.
  merge-gate:
    needs: [verify]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    steps:
      - name: Require all checks to pass
        run: |
          if [ "${{ needs.verify.result }}" != "success" ]; then
            echo "merge-gate: verify did not succeed (${{ needs.verify.result }})"
            exit 1
          fi
          echo "merge-gate: all required checks passed"
