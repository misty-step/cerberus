# Cerberus API-mode consumer workflow.
#
# Single-step review via the hosted Cerberus API.
# Prerequisites:
#   - `CERBERUS_API_KEY` secret for API authentication
#   - `CERBERUS_URL` repository variable or secret
#
# Optional inputs:
#   - `model`
#   - `timeout`
#   - `poll-interval`
#   - `fail-on-verdict`
name: Cerberus Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: cerberus-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: misty-step/cerberus@master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          api-key: ${{ secrets.CERBERUS_API_KEY }}
          cerberus-url: ${{ vars.CERBERUS_URL }}
          fail-on-verdict: 'true'
