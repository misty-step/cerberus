# Workflow Lint (Cerberus API mode)
name: Cerberus Workflow Lint

on:
  push:
    paths:
      - .github/workflows/*.yml
      - .github/workflows/*.yaml
  pull_request:
    paths:
      - .github/workflows/*.yml
      - .github/workflows/*.yaml

permissions:
  contents: read

jobs:
  cerberus-workflow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install yamllint -q
      - run: yamllint .github/workflows/*.yml
