# Cerberus Configuration
# Multi-agent AI code review system
version: 1

name: "Cerberus"
required_check: "Cerberus / Verdict"
mode: parallel
cancel_in_progress: true

providers:
  openrouter:
    adapter: openrouter

models:
  kimi_k2_5:
    provider: openrouter
    name: "openrouter/moonshotai/kimi-k2.5"
  gemini_3_flash_preview:
    provider: openrouter
    name: "openrouter/google/gemini-3-flash-preview"
  grok_4_1_fast:
    provider: openrouter
    name: "openrouter/x-ai/grok-4.1-fast"
  mercury_2:
    provider: openrouter
    name: "openrouter/inception/mercury-2"
  minimax_m2_5:
    provider: openrouter
    name: "openrouter/minimax/minimax-m2.5"
  glm_5:
    provider: openrouter
    name: "openrouter/z-ai/glm-5"
  grok_4_20_beta:
    provider: openrouter
    name: "openrouter/x-ai/grok-4.20-beta"
  grok_4_20_multi_agent_beta:
    provider: openrouter
    name: "openrouter/x-ai/grok-4.20-multi-agent-beta"

model_pools:
  wave1:
    - grok_4_1_fast
    - mercury_2
    - minimax_m2_5
  wave2:
    - kimi_k2_5
    - gemini_3_flash_preview
    - glm_5
  wave3:
    - grok_4_20_beta
    - grok_4_20_multi_agent_beta
    - kimi_k2_5

prompts:
  correctness:
    path: pi/agents/correctness.md
  architecture:
    path: pi/agents/architecture.md
  security:
    path: pi/agents/security.md
  maintainability:
    path: pi/agents/maintainability.md
  testing:
    path: pi/agents/testing.md
  resilience:
    path: pi/agents/resilience.md

templates:
  review:
    path: templates/review-prompt.md

routing:
  enabled: true
  model: gemini_3_flash_preview
  panel_size: 4
  always_include:
    - trace
  include_if_code_changed:
    - guard
  fallback_panel:
    - trace
    - guard
    - atlas
    - proof
    - fuse
    - craft

override:
  enabled: true
  command: "/cerberus override"
  actor: pr_author
  require_reason: true
  pin_to_sha: true

verdict:
  fail_on: "any_critical_or_2_major"
  warn_on: "any_major_or_5_minor_or_3_minor_same_category"
  confidence_min: 0.7

cerberus_verdict:
  fail_on: "any_critical_fail_or_2_fails"

reviewers:
  - id: trace
    perspective: correctness
    prompt: correctness
    template: review
    model: pool
    description: "Correctness — Find the bug"
    override: pr_author
    tools:
      shell: false

  - id: atlas
    perspective: architecture
    prompt: architecture
    template: review
    model: pool
    description: "Architecture — Zoom out"
    override: pr_author
    tools:
      shell: false

  - id: guard
    perspective: security
    prompt: security
    template: review
    model: pool
    description: "Security — Think like an attacker"
    override: maintainers_only
    tools:
      shell: false

  - id: craft
    perspective: maintainability
    prompt: maintainability
    template: review
    model: pool
    description: "Maintainability — Think like the next dev"
    override: pr_author
    tools:
      shell: false

  - id: proof
    perspective: testing
    prompt: testing
    template: review
    model: pool
    description: "Testing — See what will break"
    override: pr_author
    tools:
      shell: false

  - id: fuse
    perspective: resilience
    prompt: resilience
    template: review
    model: pool
    description: "Resilience — What happens when the happy path fails"
    override: pr_author
    tools:
      shell: false

canary:
  enabled: false
  service: "cerberus"
