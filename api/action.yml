name: 'Cerberus Review (API)'
description: 'Dispatch a Cerberus code review via the hosted API. Replaces the heavy GHA pipeline with a thin HTTP client.'
author: 'misty-step'

branding:
  icon: 'eye'
  color: 'red'

inputs:
  github-token:
    description: 'GitHub token used by the hosted Cerberus pipeline for PR reads and writes. Sent per request; not persisted.'
    required: false
    default: ''
  api-key:
    description: 'Cerberus API authentication key'
    required: true
  cerberus-url:
    description: 'Cerberus API base URL (e.g., https://cerberus.fly.dev)'
    required: true
  model:
    description: 'Model override (optional). Passed to the API for reviewer model selection.'
    default: ''
  timeout:
    description: 'Maximum seconds to wait for review completion'
    default: '600'
  poll-interval:
    description: 'Seconds between status polls'
    default: '5'
  fail-on-verdict:
    description: 'Exit with failure if aggregated verdict is FAIL'
    default: 'true'

outputs:
  verdict:
    description: 'Aggregated review verdict (PASS, WARN, FAIL, SKIP)'
    value: ${{ steps.dispatch.outputs.verdict }}
  review-id:
    description: 'Cerberus API review run ID'
    value: ${{ steps.dispatch.outputs.review-id }}

runs:
  using: 'composite'
  steps:
    - name: Preflight + Dispatch
      id: dispatch
      shell: bash
      env:
        CERBERUS_API_KEY: ${{ inputs.api-key }}
        CERBERUS_URL: ${{ inputs.cerberus-url }}
        CERBERUS_MODEL: ${{ inputs.model }}
        CERBERUS_TIMEOUT: ${{ inputs.timeout }}
        CERBERUS_POLL_INTERVAL: ${{ inputs.poll-interval }}
        CERBERUS_FAIL_ON_VERDICT: ${{ inputs.fail-on-verdict }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        BASE_REPO: ${{ github.event.pull_request.base.repo.full_name }}
        HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        IS_DRAFT: ${{ github.event.pull_request.draft }}
      run: |
        bash "${{ github.action_path }}/dispatch.sh"
