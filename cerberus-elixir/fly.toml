# Cerberus Elixir — Fly/Sprite deployment configuration
#
# This file declares the intended runtime configuration for the Cerberus API
# when deployed to a Fly Sprite. The sprite CLI does not consume this file
# directly; it serves as the single source of truth for port, health check,
# region, and VM sizing so that deploy-sprite.sh and CI/CD stay aligned.

app = "cerberus-api"
primary_region = "iad"

[env]
  PORT = "8080"
  MIX_ENV = "prod"
  CERBERUS_REPO_ROOT = "/home/sprite/cerberus"
  CERBERUS_DB_PATH = "/home/sprite/data/cerberus.sqlite3"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
